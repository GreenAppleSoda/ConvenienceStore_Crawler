# 행사 상품 → Supabase 백업 (4브랜드 병렬)
#
# Repository Secrets:
#   SUPABASE_URL
#   SUPABASE_SERVICE_ROLE_KEY
#
# 수동 실행: Actions 탭 → Crawl Events (Supabase) → Run workflow

name: Crawl Events (Supabase)

on:
  schedule:
    # Firebase bulk 직후(월 09:30 KST)
    - cron: "30 0 * * 1"
  workflow_dispatch:

concurrency:
  group: crawl-events-supabase
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        brand: [gs25, cu, seven_eleven, emart24]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run crawler
        env:
          PYTHONPATH: ${{ github.workspace }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python crawlers/events/supabase/${{ matrix.brand }}.py
