# 매장 위치 → Supabase (7-ELEVEN)
# 해외 IP 차단 → 스케줄 없음, 로컬 또는 수동 실행만
#
# 로컬: python crawlers/locations/supabase/seven_eleven.py

name: Crawl Locations Supabase (7-ELEVEN)

on:
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - run: pip install -r requirements.txt

      - name: Run crawler
        env:
          PYTHONPATH: ${{ github.workspace }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python crawlers/locations/supabase/seven_eleven.py
