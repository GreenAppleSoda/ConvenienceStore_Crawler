# 매장 위치 → Firestore (emart24)
# 매월 5일 10:00 KST

name: Crawl Locations Firebase (emart24)

on:
  schedule:
    - cron: "0 1 5 * *"
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - run: pip install -r requirements.txt

      - name: Write Firebase credentials
        env:
          FIREBASE_JSON: ${{ secrets.FIREBASE_KEY }}
        run: |
          mkdir -p config
          printf '%s' "$FIREBASE_JSON" > config/firebase-service-account.json

      - name: Run crawler
        env:
          PYTHONPATH: ${{ github.workspace }}
          FIREBASE_CREDENTIALS: config/firebase-service-account.json
        run: python crawlers/locations/firebase/emart24.py
