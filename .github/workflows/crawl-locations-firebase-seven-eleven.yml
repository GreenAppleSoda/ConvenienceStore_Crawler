# 매장 위치 → Firestore (7-ELEVEN)
# 해외 IP 차단 → 스케줄 없음, 로컬 또는 수동 실행만
#
# 로컬: python crawlers/locations/firebase/seven_eleven.py

name: Crawl Locations Firebase (7-ELEVEN)

on:
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - run: pip install -r requirements.txt

      - name: Write Firebase credentials
        env:
          FIREBASE_JSON: ${{ secrets.FIREBASE_KEY }}
        run: python scripts/write_firebase_credentials.py

      - name: Run crawler
        env:
          PYTHONPATH: ${{ github.workspace }}
          FIREBASE_CREDENTIALS: config/firebase-service-account.json
        run: python crawlers/locations/firebase/seven_eleven.py
